[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    slow: subprocess / integration tests that start real Python processes
          (skipped by default — run with --slow to include)
addopts =
    --tb=short
    --ignore=.venv
    --ignore=story
    --ignore=tmp
    --ignore=api_cache
    --ignore=__pycache__
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
